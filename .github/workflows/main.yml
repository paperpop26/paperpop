name: Windows EXE 빌드

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas openpyxl pyinstaller
      - run: pyinstaller --onefile --windowed --name "페이퍼팝_송장자동화" app.py
      - uses: actions/upload-artifact@v4
        with:
          name: 페이퍼팝_송장자동화_윈도우
          path: dist/페이퍼팝_송장자동화.exe
          retention-days: 30
